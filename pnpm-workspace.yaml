packages:
  - packages/*
  - examples/*
  - docs

allowBuilds:
  '@tailwindcss/oxide': true
  cbor-extract: true
  esbuild: true
  protobufjs: true
  sharp: true
  # used only in examples/memory
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true

overrides:
  '@types/node': 22.19.13

publishBranch: main
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - tensorlake
blockExoticSubdeps: true
strictDepBuilds: true
